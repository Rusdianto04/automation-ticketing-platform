name: ci-build-push

on:
  push:
    branches: [ '**' ]
    paths:
      - 'formbricks-discord-bot/**'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'formbricks-discord-bot/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image variables
        id: image-vars
        shell: bash
        run: |
          echo "frontend_image=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend" >> $GITHUB_OUTPUT
          echo "backend_image=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend"   >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./formbricks-discord-bot/backend
          file: ./formbricks-discord-bot/backend/Dockerfile
          push: true
          tags: ${{ steps.image-vars.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./formbricks-discord-bot/frontend
          file: ./formbricks-discord-bot/frontend/Dockerfile
          push: true
          tags: ${{ steps.image-vars.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
