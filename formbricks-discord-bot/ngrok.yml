# ngrok.yml — Konfigurasi Ngrok Tunnel
#
# CARA KERJA:
#   Container sis-ngrok membaca file ini via volume mount: ./ngrok.yml:/etc/ngrok.yml
#   Authtoken disimpan langsung di sini (bukan via env var) — identik dengan
#   versi original yang berhasil (container: formbricks-ngrok).
#
# SETELAH NGROK UP, ambil URL publik:
#   Cara 1: docker logs sis-ngrok 2>&1 | grep -i "url\|started\|ngrok"
#   Cara 2: Buka browser → http://localhost:4040 (ngrok inspector UI)
#   Cara 3: ./start.sh ngrok-url
#
# SET URL DI FORMBRICKS:
#   Formbricks Dashboard → Settings → Integrations → Webhooks → Add Webhook
#   URL: https://xxxx.ngrok-free.app/webhook/formbricks
#
# PENTING tentang addr:
#   Gunakan SERVICE NAME Docker Compose (bukan container_name).
#   service name = "backend"       <- key di services: di docker-compose.yml
#   container_name = "sis-backend"  <- hanya label, bukan DNS Docker internal
#   Docker DNS resolve via service name -> "backend:3000" BUKAN "sis-backend:3000"

version: "3"
agent:
  authtoken: "36aWTUi38SPc4aET6UErjupLUQX_35gMk2gozagCKNPVmceXx"

tunnels:
  bot:
    addr: backend:3000
    proto: http
    inspect: true
    # Opsional: jika punya domain tetap (ngrok paid plan), uncomment:
    # domain: your-domain.ngrok-free.app
