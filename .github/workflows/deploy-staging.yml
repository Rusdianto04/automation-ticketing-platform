name: deploy-staging

on:
  push:
    branches: [ 'staged' ]
    paths:
      - 'formbricks-discord-bot/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_OWNER:    ${{ github.repository_owner }}
  REPO_NAME:      ${{ github.event.repository.name }}

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        shell: bash
        run: |
          echo "FRONTEND_IMAGE=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-frontend:staging" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-backend:staging"   >> $GITHUB_ENV

      - name: Build & push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./formbricks-discord-bot/backend
          file: ./formbricks-discord-bot/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./formbricks-discord-bot/frontend
          file: ./formbricks-discord-bot/frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          cache-from: type=gha

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host:     ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo ">>> Pulling latest images..."
            docker pull ${{ env.FRONTEND_IMAGE }}
            docker pull ${{ env.BACKEND_IMAGE }}

            echo ">>> Deploying with docker-compose..."
            cd ~/deploy/formbricks-discord-bot
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }} \
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }} \
            docker compose up -d --remove-orphans

            echo ">>> Staging deploy selesai."

      - name: Notif Discord — Staging Sukses
        if: success()
        uses: ./.github/actions/discord-notify
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status:  success
          title:   "✅ Staging Deployed: ${{ github.repository }}"
          body: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **URL:** ${{ secrets.STAGE_APP_URL }}
            **Actor:** ${{ github.actor }}

      - name: Notif Discord — Staging Gagal
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status:  failure
          title:   "❌ Staging Deploy Gagal: ${{ github.repository }}"
          body: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
