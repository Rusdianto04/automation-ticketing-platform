# =============================================================================
# docker-compose.prod.yml — Support & Incident System (Production)
#
# Usage:
#   ./infra/scripts/start.sh        ← recommended (auto-inject HOST_IP)
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sis-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB:       ${DB_NAME:-formbricks_tickets}
      POSTGRES_USER:     ${DB_USER:-formbricks_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-formbricks_pass}
    volumes:
      - sis_postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sis-network
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-formbricks_user} -d ${DB_NAME:-formbricks_tickets}"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── Backend: Discord Bot + Express API ──────────────────────────────────────
  backend:
    build:
      context:    ./apps/backend
      dockerfile: Dockerfile
    container_name: sis-backend
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV:            ${NODE_ENV:-production}
      PORT:                3000
      ORG_NAME:            ${ORG_NAME:-SEAMOLEC}
      ORG_DEPARTMENT:      ${ORG_DEPARTMENT:-IT Department}
      DATABASE_URL:        postgresql://${DB_USER:-formbricks_user}:${DB_PASSWORD:-formbricks_pass}@postgres:5432/${DB_NAME:-formbricks_tickets}?schema=public
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             ${DB_NAME:-formbricks_tickets}
      DB_USER:             ${DB_USER:-formbricks_user}
      DB_PASSWORD:         ${DB_PASSWORD:-formbricks_pass}
      DB_PASS:             ${DB_PASSWORD:-formbricks_pass}
      DISCORD_BOT_TOKEN:   ${DISCORD_BOT_TOKEN}
      DISCORD_CHANNEL_ID:  ${DISCORD_CHANNEL_ID}
      DISCORD_GUILD_ID:    ${DISCORD_GUILD_ID:-}
      N8N_WEBHOOK_URL:     ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/discord-activity}
      N8N_CHATBOT_WEBHOOK: ${N8N_CHATBOT_WEBHOOK:-http://n8n:5678/webhook/chatbot-qa}
      N8N_API_KEY:         ${N8N_API_KEY:-automation_ticketing01_incident02}
      SMTP_HOST:           ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      EMAIL_FROM:          ${EMAIL_FROM:-}
      GROQ_API_KEY:        ${GROQ_API_KEY:-}
      FORM_ID_TICKETING:   ${FORM_ID_TICKETING:-zcp7cbqqrtavbyd6wwkmk2vx}
      FORM_ID_INCIDENT:    ${FORM_ID_INCIDENT:-cmiobkjfm2piqad012scz1yxf}
      PORTAL_URL:          ${PORTAL_URL:-}
      HOST_IP:             ${HOST_IP:-}
      PDF_OUTPUT_DIR:      /app/public/reports
      BACKEND_SELF_URL:    http://backend:3000
      FRONTEND_URL:        http://frontend:3001
    volumes:
      - sis_reports_data:/app/public/reports
      - ./logs/backend:/app/logs
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 60s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── Frontend: Next.js Portal ────────────────────────────────────────────────
  frontend:
    build:
      context:    ./apps/frontend
      dockerfile: Dockerfile
    container_name: sis-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV:            ${NODE_ENV:-production}
      PORT:                3001
      DATABASE_URL:        postgresql://${DB_USER:-formbricks_user}:${DB_PASSWORD:-formbricks_pass}@postgres:5432/${DB_NAME:-formbricks_tickets}?schema=public
      BACKEND_URL:         http://backend:3000
      BACKEND_SELF_URL:    http://backend:3000
      N8N_API_KEY:         ${N8N_API_KEY:-automation_ticketing01_incident02}
      ORG_NAME:            ${ORG_NAME:-SEAMOLEC}
      ORG_DEPARTMENT:      ${ORG_DEPARTMENT:-IT Department}
      ADMIN_USERNAME:      ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:      ${ADMIN_PASSWORD:-Admin@IT2026}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET:          ${JWT_SECRET:-sis_jwt_secret_change_this}
      NEXTAUTH_URL:        ${NEXTAUTH_URL:-http://localhost:3001}
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs/frontend:/app/logs
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval:     30s
      timeout:      15s
      retries:      5
      start_period: 120s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── N8N Workflow Engine ──────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sis-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE:             true
      N8N_BASIC_AUTH_USER:               ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:           ${N8N_PASS:-admin123}
      N8N_HOST:                          0.0.0.0
      N8N_PORT:                          5678
      N8N_PROTOCOL:                      http
      WEBHOOK_URL:                       ${N8N_WEBHOOK_BASE:-http://n8n:5678}
      GENERIC_TIMEZONE:                  Asia/Jakarta
      DB_TYPE:                           postgresdb
      DB_POSTGRESDB_HOST:                postgres
      DB_POSTGRESDB_PORT:                5432
      DB_POSTGRESDB_DATABASE:            n8n_db 
      DB_POSTGRESDB_USER:                ${DB_USER:-formbricks_user}
      DB_POSTGRESDB_PASSWORD:            ${DB_PASSWORD:-formbricks_pass}
      BOT_API_URL:                       http://backend:3000
      N8N_API_KEY:                       ${N8N_API_KEY:-automation_ticketing01_incident02}
      GROQ_API_KEY:                      ${GROQ_API_KEY:-}
      N8N_DIAGNOSTICS_ENABLED:           false
      N8N_VERSION_NOTIFICATIONS_ENABLED: false
      N8N_TEMPLATES_ENABLED:             false
      EXECUTIONS_DATA_PRUNE:             true
      EXECUTIONS_DATA_MAX_AGE:           168
    volumes:
      - sis_n8n_data:/home/node/.n8n
      - ./apps/backend/n8n-workflows:/home/node/.n8n/workflows
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sis-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - sis-network
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── Ngrok — Public Tunnel ────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: sis-ngrok
    restart: unless-stopped
    command:
      - "start"
      - "bot"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./infra/scripts/ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    networks:
      - sis-network
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  sis_postgres_data:
    name: sis_postgres_data
  sis_n8n_data:
    name: sis_n8n_data
  sis_reports_data:
    name: sis_reports_data

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  sis-network:
    name: sis-network
    driver: bridge
