name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build-backend:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Check syntax (node --check)
        working-directory: apps/backend
        run: |
          find src -name "*.js" | xargs -I{} node --check {}

  lint-and-build-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/frontend
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
        run: npx prisma generate

      - name: Build frontend
        working-directory: apps/frontend
        env:
          DATABASE_URL:  "postgresql://user:pass@localhost:5432/db?schema=public"
          JWT_SECRET:    "ci-secret"
          NEXTAUTH_URL:  "http://localhost:3001"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
        run: npm run build

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [lint-and-build-backend, lint-and-build-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context:   ./apps/backend
          file:      ./apps/backend/Dockerfile
          push:      false
          tags:      support-incident-system/backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context:   ./apps/frontend
          file:      ./apps/frontend/Dockerfile
          push:      false
          tags:      support-incident-system/frontend:ci
          build-args: |
            DATABASE_URL=postgresql://user:pass@localhost:5432/db?schema=public
          cache-from: type=gha
          cache-to:   type=gha,mode=max
