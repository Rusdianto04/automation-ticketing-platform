# =============================================================================
# docker-compose.dev.yml — Support & Incident System (Development)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Services: postgres, backend, frontend, n8n
# =============================================================================

services:

  postgres:
    image: postgres:15-alpine
    container_name: sis-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB:       ${DB_NAME:-formbricks_tickets}
      POSTGRES_USER:     ${DB_USER:-formbricks_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-formbricks_pass}
    volumes:
      - sis_postgres_data_dev:/var/lib/postgresql/data
    networks:
      - sis-network
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-formbricks_user} -d ${DB_NAME:-formbricks_tickets}"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./apps/backend
      dockerfile: Dockerfile
      target:     runner
    container_name: sis-backend-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV:        development
      PORT:            3000
      DATABASE_URL:    postgresql://${DB_USER:-formbricks_user}:${DB_PASSWORD:-formbricks_pass}@postgres:5432/${DB_NAME:-formbricks_tickets}?schema=public
      DB_HOST:         postgres
      BACKEND_SELF_URL: http://backend:3000
      FRONTEND_URL:    http://frontend:3001
    volumes:
      - ./apps/backend/src:/app/src
      - ./logs/backend:/app/logs
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

  frontend:
    build:
      context:    ./apps/frontend
      dockerfile: Dockerfile
      target:     runner
    container_name: sis-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV:          development
      PORT:              3001
      DATABASE_URL:      postgresql://${DB_USER:-formbricks_user}:${DB_PASSWORD:-formbricks_pass}@postgres:5432/${DB_NAME:-formbricks_tickets}?schema=public
      BACKEND_URL:       http://backend:3000
      BACKEND_SELF_URL:  http://backend:3000
      N8N_API_KEY:       ${N8N_API_KEY:-automation_ticketing01_incident02}
      ORG_NAME:          ${ORG_NAME:-SEAMOLEC}
      ORG_DEPARTMENT:    ${ORG_DEPARTMENT:-IT Department}
      NEXTAUTH_URL:      http://localhost:3001
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs/frontend:/app/logs
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: sis-n8n-dev
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE:             true
      N8N_BASIC_AUTH_USER:               ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:           ${N8N_PASS:-admin123}
      N8N_HOST:                          0.0.0.0
      N8N_PORT:                          5678
      N8N_PROTOCOL:                      http
      WEBHOOK_URL:                       ${N8N_WEBHOOK_BASE:-http://n8n:5678}
      GENERIC_TIMEZONE:                  Asia/Jakarta
      DB_TYPE:                           postgresdb
      DB_POSTGRESDB_HOST:                postgres
      DB_POSTGRESDB_PORT:                5432
      DB_POSTGRESDB_DATABASE:            ${DB_NAME:-formbricks_tickets}
      DB_POSTGRESDB_USER:                ${DB_USER:-formbricks_user}
      DB_POSTGRESDB_PASSWORD:            ${DB_PASSWORD:-formbricks_pass}
      BOT_API_URL:                       http://backend:3000
      N8N_API_KEY:                       ${N8N_API_KEY:-automation_ticketing01_incident02}
      GROQ_API_KEY:                      ${GROQ_API_KEY:-}
      N8N_DIAGNOSTICS_ENABLED:           false
      N8N_VERSION_NOTIFICATIONS_ENABLED: false
      N8N_TEMPLATES_ENABLED:             false
    volumes:
      - sis_n8n_data_dev:/home/node/.n8n
      - ./apps/backend/n8n-workflows:/home/node/.n8n/workflows
    networks:
      - sis-network
    depends_on:
      postgres:
        condition: service_healthy

  ngrok:
      image: ngrok/ngrok:latest
      container_name: sis-ngrok-dev
      restart: unless-stopped
      command:
        - "start"
        - "bot"
        - "--config"
        - "/etc/ngrok.yml"
      volumes:
        - ./ngrok.yml:/etc/ngrok.yml:ro
      ports:
        - "4040:4040"
      networks:
        - sis-network
      depends_on:
        - backend
      logging:
        driver: "json-file"
        options: { max-size: "5m", max-file: "2" }

volumes:
  sis_postgres_data_dev:
    external: true
    name: formbricks-discord-bot_postgres_data
  sis_n8n_data_dev:
    external: true
    name: formbricks-discord-bot_n8n_data
  reports_data_dev:
    external: true
    name: formbricks-discord-bot_reports_data

networks:
  sis-network:
    name: sis-network
    driver: bridge
