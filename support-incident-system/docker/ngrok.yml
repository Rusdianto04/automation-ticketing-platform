# ngrok.yml — Konfigurasi Ngrok Tunnel
#
# Container sis-ngrok membaca file ini via volume mount:
#   ./docker/ngrok.yml:/etc/ngrok.yml:ro
#
# Setelah ngrok aktif, lihat URL publik:
#   docker logs sis-ngrok
#   Atau buka: http://SERVER_IP:4040
#
# Set URL di Formbricks:
#   Settings → Integrations → Webhooks → Add Webhook
#   URL: https://xxxx.ngrok-free.app/webhook/formbricks

version: "3"
